version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gocognit
  settings:
    errcheck:
      check-type-assertions: true
    gocognit:
      min-complexity: 20
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocognit
