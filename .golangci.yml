version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gocognit
    # Catches unexported dead code (unreferenced private functions/types).
    # Does NOT catch exported functions whose only caller is a test —
    # exported-is-used defaults to true, and the setting to disable it is
    # deprecated/unstable upstream. See CLAUDE.md "Engineering Standards"
    # for the process rule that actually covers that gap.
    - unused
  settings:
    errcheck:
      check-type-assertions: true
    gocognit:
      min-complexity: 20
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocognit
