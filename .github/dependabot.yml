version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      modernc:
        patterns:
          - "modernc.org/*"
      wails:
        patterns:
          - "github.com/wailsapp/*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "@chromatic-com/storybook"
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-router"
          - "vue-tsc"
          - "pinia"
      primevue:
        patterns:
          - "primevue"
          - "@primeuix/*"
          - "primeicons"
      vite-vitest:
        patterns:
          - "vite"
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"

  - package-ecosystem: npm
    directory: /user-docs
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
