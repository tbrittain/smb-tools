name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -tags webkit2_41 ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: smb-tools-windows-amd64
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: smb-tools-linux-amd64
            build-flags: -tags webkit2_41
          - os: macos-latest
            platform: darwin/universal
            artifact: smb-tools-macos-universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Build
        shell: bash
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build-flags }} -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/smb-tools.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }}.zip smb-tools

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }}.zip smb-tools.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            smb-tools-windows-amd64.zip
            smb-tools-linux-amd64.zip
            smb-tools-macos-universal.zip
