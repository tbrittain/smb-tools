name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -tags webkit2_41 ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: smb-tools-windows-amd64
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: smb-tools-linux-amd64
            build-flags: -tags webkit2_41
          - os: macos-latest
            platform: darwin/universal
            artifact: smb-tools-macos-universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        shell: bash
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build-flags }} -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/smb-tools.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }}.zip smb-tools

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../${{ matrix.artifact }}.zip smb-tools.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            smb-tools-windows-amd64.zip
            smb-tools-linux-amd64.zip
            smb-tools-macos-universal.zip
