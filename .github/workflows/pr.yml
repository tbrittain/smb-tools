name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  WAILS_VERSION: v2.12.0

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            user-docs/package-lock.json

      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Go test
        run: go test -tags webkit2_41 ./...

      - name: Frontend test
        run: cd frontend && npm run test:run

      - name: Install docs dependencies
        run: cd user-docs && npm ci

      - name: Build docs
        run: cd user-docs && npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v5
        with:
          path: ~/go/bin/wails
          key: wails-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41 -s
